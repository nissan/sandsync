config:
  edition: 3

streams:
  # User stories stream — syncs all stories, chapters, and agent events for the authenticated user.
  # auto_subscribe: true means clients sync automatically on connect (no client-side subscribe() call needed).
  # auth.user_id() maps to the JWT `sub` claim — dev token uses subject "openclaw".
  user_stories:
    auto_subscribe: true
    queries:
      # Stories owned by this user
      - SELECT * FROM stories WHERE user_id = auth.user_id()
      # Chapters for those stories (subquery join)
      - SELECT * FROM story_chapters WHERE story_id IN (SELECT id FROM stories WHERE user_id = auth.user_id())
      # Agent events for those stories
      - SELECT * FROM agent_events WHERE story_id IN (SELECT id FROM stories WHERE user_id = auth.user_id())
